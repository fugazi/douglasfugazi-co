<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for the full bolt shape -->
    <clipPath id="bolt-clip">
      <polygon points="36,4 16,33 28,33 22,60 50,27 36,27 44,4"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#000000"/>
  
  <!-- Full bolt clipped into 3 horizontal bands -->
  <g clip-path="url(#bolt-clip)" filter="url(#glow)">
    <!-- Top third - Yellow -->
    <rect x="0" y="4" width="64" height="19" fill="#FFD700"/>
    <!-- Middle third - Blue -->
    <rect x="0" y="23" width="64" height="19" fill="#0088FF"/>
    <!-- Bottom third - Red -->
    <rect x="0" y="42" width="64" height="20" fill="#FF2244"/>
  </g>
</svg>
